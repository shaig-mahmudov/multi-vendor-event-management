spring.datasource.url=jdbc:mysql://localhost:3306/event_management

spring.jpa.hibernate.ddl-auto=update

spring.profiles.active=local

app.jwt.secret=${JWT_SECRET:bXlzdXBlcnNlY3JldGtleW15c3VwZXJzZWNyZXRrZXkxMjM0NTY3OA==}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# Bootstrap an admin user (disabled by default)
# To enable: set APP_BOOTSTRAP_ADMIN=true and provide APP_BOOTSTRAP_ADMIN_PASSWORD
app.bootstrap-admin=${APP_BOOTSTRAP_ADMIN:false}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
app.bootstrap-admin.name=${APP_BOOTSTRAP_ADMIN_NAME:Admin}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}